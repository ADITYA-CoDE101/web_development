<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="6css.css">
    <style>body {
        background-color: white;
        color: black;
        transition: 0.3s;
        }

        .dark {
        background-color: #121212;
        color: white;
        }
    </style>
</head>
<body>
    <h1 id="h1">Home page</h1>
    <p id="p">This is the home page of the website</p>
    
    <button id="btn2"><a href="about_us.html">about</a></button>
    <button id="themeToggle">Toggle Dark Mode</button>
   <button id="btn2"><a href="testimonial.html">testimonials</a></button>

    
<script>
    const toggleBtn = document.querySelector("#themeToggle")

    const savedTheme = localStorage.getItem("theme")

    if (savedTheme === "dark") {
        document.body.classList.add("dark")
    }

    toggleBtn.addEventListener("click", function () {
        document.body.classList.toggle("dark")
        if (document.body.classList.contains("dark")) {
            localStorage.setItem("theme", "dark")
        } else {
            localStorage.setItem("theme", "light")
        }
    })
</script>

</body>
</html>
